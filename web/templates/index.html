    <!-- ──────────────────────────────────── -->
    <!-- FEATURE 1: Hello World              -->
    <!-- ──────────────────────────────────── -->
    <div class="card">
      <h2>👋 Hello World</h2>
      <p class="description">Enter your name and Claude will greet you.</p>

      <div class="input-row">
        <input
          id="name-input"
          type="text"
          placeholder="Enter your name..."
          onkeydown="if(event.key==='Enter') sayHello()"
        />
        <button onclick="sayHello()">Say Hello</button>
      </div>

      <!-- Loading indicator -->
      <p id="hello-loading" class="loading" style="display:none;">⏳ Claude is thinking...</p>

      <!-- Result box -->
      <div id="hello-result" class="result-box" style="display:none;"></div>
    </div>

  <!-- ──────────────────────────────────── -->
  <!-- JavaScript — one function per feature -->
  <!-- ──────────────────────────────────── -->
  <script>

    // ── Feature 1: Hello World ──
    async function sayHello() {
      const name = document.getElementById("name-input").value.trim();
      if (!name) {
        alert("Please enter your name first!");
        return;
      }

      // Show loading, hide old result
      document.getElementById("hello-loading").style.display = "block";
      document.getElementById("hello-result").style.display = "none";

      try {
        const res = await fetch("/hello", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: name })
        });

        const data = await res.json();

        // Show the result
        const resultBox = document.getElementById("hello-result");
        resultBox.textContent = data.message;
        resultBox.style.display = "block";

      } catch (error) {
        document.getElementById("hello-result").textContent =
          "⚠️ Error: Could not reach the agent. Is the server running?";
        document.getElementById("hello-result").style.display = "block";
      } finally {
        document.getElementById("hello-loading").style.display = "none";
      }
    }
